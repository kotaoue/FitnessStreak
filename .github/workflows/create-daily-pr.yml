name: Create Daily Fitness PR

on:
  schedule:
    - cron: '15 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Get current date
        id: date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create fitness result file
        env:
          PR_TITLE: ${{ steps.date.outputs.date }}
        run: python3 .github/scripts/save_results.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add fitness log for ${{ steps.date.outputs.date }}"
          branch: "fitness/${{ steps.date.outputs.date }}"
          title: "${{ steps.date.outputs.date }}"
          body: |
            - [ ] ストレッチ
            - [ ] ラジオ体操
            - [ ] 筋トレ
            - [ ] 運動
          assignees: kotaoue
          base: main
