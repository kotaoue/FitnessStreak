name: Create Daily Fitness PR

on:
  schedule:
    - cron: '15 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create branch
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "fitness/$DATE"; then
            echo "Branch fitness/$DATE already exists on remote, skipping creation"
          else
            git checkout -b "fitness/$DATE"
            git push origin "fitness/$DATE"
          fi

      - name: Create Pull Request
        env:
          DATE: ${{ steps.date.outputs.date }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view "fitness/$DATE" --json number > /dev/null 2>&1; then
            echo "PR already exists for fitness/$DATE, skipping creation"
          else
            cat > /tmp/pr-body.md << 'EOF'
          - [ ] ラジオ体操
          - [ ] ストレッチ
          - [ ] 筋トレ
          - [ ] ツボ押し
          EOF
            gh pr create \
              --title "$DATE" \
              --body-file /tmp/pr-body.md \
              --assignee kotaoue \
              --base main \
              --head "fitness/$DATE"
          fi
