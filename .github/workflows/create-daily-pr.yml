name: Create Daily Fitness PR

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create branch and initial results file
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "fitness/$DATE"
          python3 .github/scripts/create_initial_results.py
          git add results/
          git commit -m "Add fitness tracking for $DATE"
          git push origin "fitness/$DATE"

      - name: Create Pull Request
        env:
          DATE: ${{ steps.date.outputs.date }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '- [ ] ラジオ体操\n- [ ] ストレッチ\n- [ ] 筋トレ\n- [ ] ツボ押し\n' > /tmp/pr-body.md
          gh pr create \
            --title "$DATE" \
            --body-file /tmp/pr-body.md \
            --assignee kotaoue \
            --base main \
            --head "fitness/$DATE"
