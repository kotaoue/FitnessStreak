name: Create Daily Fitness PR

on:
  schedule:
    - cron: '15 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get current date
        id: date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create fitness result file
        env:
          PR_TITLE: ${{ steps.date.outputs.date }}
        run: python3 .github/scripts/save_results.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add fitness log for ${{ steps.date.outputs.date }}"
          branch: "fitness/${{ steps.date.outputs.date }}"
          title: "${{ steps.date.outputs.date }}"
          body: |
            - [ ] ストレッチ
            - [ ] ラジオ体操
            - [ ] 筋トレ
            - [ ] 運動
          assignees: kotaoue
          base: main
