name: Create Daily Fitness PR

on:
  schedule:
    - cron: '15 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      # peter-evans/create-pull-request@v6 はワークスペースにファイルの変更がないと
      # ブランチもPRも作成しないため、コミット対象としてフィットネスログファイルを作成する
      - name: Create fitness log file
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          mkdir -p fitness
          printf '- [ ] ラジオ体操\n- [ ] ストレッチ\n- [ ] 筋トレ\n- [ ] ツボ押し\n' > "fitness/$DATE.md"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add fitness log for ${{ steps.date.outputs.date }}"
          branch: "fitness/${{ steps.date.outputs.date }}"
          title: "${{ steps.date.outputs.date }}"
          body: |
            - [ ] ラジオ体操
            - [ ] ストレッチ
            - [ ] 筋トレ
            - [ ] ツボ押し
          assignees: kotaoue
          base: main
