name: Save Fitness Results

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  save-results:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'fitness/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Parse checkboxes and save results
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 .github/scripts/save_results.py

      - name: Commit and push results
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "Save fitness results for ${PR_TITLE//[^0-9-]/}"
          for i in 1 2 3; do
            git pull --rebase && git push && break || sleep 5
          done
