name: Generate Fitness Heatmap

on:
  schedule:
    - cron: '0 18 * * *'  # 03:00 JST (UTC+9)
  push:
    branches: [main]
    paths:
      - 'results/*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate heatmap SVG
        run: python3 .github/scripts/generate_heatmap.py

      - name: Commit and push heatmap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/heatmap.svg
          git diff --cached --quiet || git commit -m "Update fitness heatmap"
          for i in 1 2 3; do
            git pull --rebase && git push && break || sleep 5
          done
